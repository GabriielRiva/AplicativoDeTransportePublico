name: trancity
description: >-
  Aplicativo de rastreamento de onibus do transporte publico de Chapeco-SC
  em tempo real. Prototipo academico (TCC) - Ciencias da Computacao.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_database: ^11.1.4

  # Mapas e localizacao
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.1

  # Gerenciamento de estado / DI
  flutter_riverpod: ^2.6.1

  # Infraestrutura
  connectivity_plus: ^6.1.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
